<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Date Master</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-gray: #8E8E93;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-left: 10px;
        }

        .card {
            background: var(--ios-card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-gray);
            margin-bottom: 10px;
            margin-left: 5px;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 17px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D1D6;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--ios-blue);
        }

        .result-box {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 0.5px solid #E5E5EA;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .result-label {
            color: var(--ios-gray);
            font-size: 15px;
        }

        .result-value {
            font-weight: 600;
            color: var(--ios-blue);
            font-size: 15px;
        }

        .btn-calculate {
            background-color: var(--ios-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-calculate:active {
            opacity: 0.8;
        }

        .format-hint {
            font-size: 12px;
            color: var(--ios-gray);
            margin-top: -10px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Date Master</h1>

        <div class="section-title">Age & Centenary</div>
        <div class="card">
            <div class="input-group">
                <label>Date of Birth</label>
                <div class="format-hint">Format: DD/MM/YYYY</div>
                <input type="text" id="dob" placeholder="31/12/1990" oninput="calculateLife()">
                
                <div id="life-results" class="result-box">
                    <div class="result-row">
                        <span class="result-label">Current Age</span>
                        <span class="result-value" id="current-age">-</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Until 100th Birthday</span>
                        <span class="result-value" id="until-100">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">Date Difference</div>
        <div class="card">
            <div class="input-group">
                <label>Start Date</label>
                <input type="text" id="start-date" placeholder="DD/MM/YYYY" oninput="calculateDiff()">
                
                <label>End Date</label>
                <input type="text" id="end-date" placeholder="DD/MM/YYYY" oninput="calculateDiff()">
                
                <div id="diff-results" class="result-box">
                    <div class="result-row">
                        <span class="result-label">Difference</span>
                        <span class="result-value" id="date-diff-val">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load stored values on startup
        window.onload = () => {
            document.getElementById('dob').value = localStorage.getItem('dob') || '';
            document.getElementById('start-date').value = localStorage.getItem('start-date') || '';
            document.getElementById('end-date').value = localStorage.getItem('end-date') || '';
            calculateLife();
            calculateDiff();
        };

        function parseDMY(s) {
            const b = s.split(/\D/);
            if(b.length !== 3) return null;
            const date = new Date(b[2], b[1] - 1, b[0]);
            return (date && date.getMonth() + 1 == b[1]) ? date : null;
        }

        function getDuration(start, end) {
            if (!start || !end) return null;
            
            let years = end.getFullYear() - start.getFullYear();
            let months = end.getMonth() - start.getMonth();
            let days = end.getDate() - start.getDate();

            if (days < 0) {
                months--;
                let prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
                days += prevMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            return `${years}y, ${months}m, ${days}d`;
        }

        function calculateLife() {
            const dobStr = document.getElementById('dob').value;
            localStorage.setItem('dob', dobStr);
            const dob = parseDMY(dobStr);
            const now = new Date();

            if (dob) {
                // Current Age
                document.getElementById('current-age').innerText = getDuration(dob, now) || "Invalid Date";
                
                // Until 100
                const hundred = new Date(dob.getFullYear() + 100, dob.getMonth(), dob.getDate());
                if (hundred > now) {
                    document.getElementById('until-100').innerText = getDuration(now, hundred);
                } else {
                    document.getElementById('until-100').innerText = "Already 100+!";
                }
            } else {
                document.getElementById('current-age').innerText = "-";
                document.getElementById('until-100').innerText = "-";
            }
        }

        function calculateDiff() {
            const startStr = document.getElementById('start-date').value;
            const endStr = document.getElementById('end-date').value;
            
            localStorage.setItem('start-date', startStr);
            localStorage.setItem('end-date', endStr);

            const start = parseDMY(startStr);
            const end = parseDMY(endStr);

            if (start && end) {
                const diff = end >= start ? getDuration(start, end) : getDuration(end, start);
                document.getElementById('date-diff-val').innerText = diff;
            } else {
                document.getElementById('date-diff-val').innerText = "-";
            }
        }
    </script>
</body>
</html>
